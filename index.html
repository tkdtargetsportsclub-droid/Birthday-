  <!DOCTYPE html>
<html>
<head>
<title>Surprise</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Arial;
  text-align:center;
  background:#ffe4ec;
}

.screen {
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.active { display:flex; }

button {
  margin-top:20px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#ff4d6d;
  color:white;
  font-size:16px;
}

.envelope {
  width:200px;
  height:120px;
  background:#ff4d6d;
  border-radius:10px;
  cursor:pointer;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-size:18px;
}
</style>
</head>

<body>

<!-- Screen 1 -->
<div class="screen active" id="s1">
  <h2>💌 Tap to open</h2>
  <div class="envelope" onclick="next(2)">Open</div>
</div>

<!-- Screen 2 -->
<div class="screen" id="s2">
  <h2>Hello Cutiee 😊</h2>
  <p>This is just a small effort to make your day better.</p>
  <button onclick="next(3)">Next</button>
</div>

<!-- Screen 3 -->
<div class="screen" id="s3">
  <h2>🙂</h2>
  <p>You are a really nice person,<br>and a little funny too 😄</p>
  <button onclick="next(4)">Next</button>
</div>

<!-- Screen 4 -->
<div class="screen" id="s4">
  <h2>🎂 Happy Birthday in Advance</h2>
  <p>Hope your day is full of smiles and good moments ✨</p>
</div>

<script>
function next(n){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("s"+n).classList.add("active");
}
</script>

</body>
</html>
