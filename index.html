<!DOCTYPE html>
<html>
<head>
<title>Surprise</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Clean Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #ffdde1, #ee9ca7);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* Container */
.container {
  width:90%;
  max-width:400px;
  height:80vh;
  background:white;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  overflow:hidden;
  position:relative;
}

/* Screens */
.screen {
  position:absolute;
  width:100%;
  height:100%;
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

.active {
  display:flex;
}

/* Text */
h1 {
  font-size:24px;
  margin-bottom:15px;
  color:#ff4d6d;
}

p {
  font-size:16px;
  color:#555;
  line-height:1.5;
}

/* Button */
button {
  margin-top:25px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#ff4d6d;
  color:white;
  font-size:14px;
  cursor:pointer;
}

/* Envelope */
.envelope {
  width:180px;
  height:110px;
  background:#ff4d6d;
  border-radius:10px;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-weight:500;
  cursor:pointer;
  margin-top:20px;
  transition:0.3s;
}

.envelope:hover {
  transform:scale(1.05);
}
</style>
</head>

<body>

<div class="container">

  <!-- Screen 1 -->
  <div class="screen active" id="s1">
    <h1>💌 A Small Surprise</h1>
    <div class="envelope" onclick="next(2)">Tap to Open</div>
  </div>

  <!-- Screen 2 -->
  <div class="screen" id="s2">
    <h1>Hello Cutiee 😊</h1>
    <p>This is just a small effort to make your day a little better.</p>
    <button onclick="next(3)">Next</button>
  </div>

  <!-- Screen 3 -->
  <div class="screen" id="s3">
    <h1>🙂</h1>
    <p>You are genuinely a nice person,<br>and yes… sometimes a little funny too 😄</p>
    <button onclick="next(4)">Next</button>
  </div>

  <!-- Screen 4 -->
  <div class="screen" id="s4">
    <h1>🎂 Happy Birthday in Advance</h1>
    <p>Hope your day is full of smiles,<br>good moments, and positive vibes ✨</p>
  </div>

</div>

<script>
function next(n){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("s"+n).classList.add("active");
}
</script>

</body>
</html>
